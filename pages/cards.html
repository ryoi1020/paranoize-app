<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOIZE — カード検索</title>
<link rel="stylesheet" href="/assets/common.css">
<style>
body{background:var(--bg);}
.header{padding:1rem 1rem 0.75rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:40;}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#064e3b,#059669,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:0.62rem;letter-spacing:0.2em;color:var(--tx3);text-transform:uppercase;margin-top:2px;}

.search-wrap{padding:0.75rem 1rem 0.5rem;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.search-box{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.85);border-radius:var(--r99);padding:0 16px;transition:all 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.search-box:focus-within{border-color:rgba(5,150,105,0.4);box-shadow:0 0 0 3px rgba(5,150,105,0.08),0 2px 12px rgba(0,0,0,0.06);}
.search-icon{color:var(--tx3);font-size:1rem;flex-shrink:0;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:0.92rem;font-family:'Noto Sans JP',sans-serif;padding:11px 0;}
.search-input::placeholder{color:var(--tx3);}
.clear-btn{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;font-size:1rem;display:none;line-height:1;}
.clear-btn.show{display:block;}

.filters{max-width:1400px;margin:0 auto;padding:0 1rem 0.75rem;display:flex;flex-wrap:wrap;gap:5px;position:relative;z-index:1;}

.stats{max-width:1400px;margin:0 auto;padding:0 1rem 0.5rem;font-size:0.72rem;color:var(--tx3);position:relative;z-index:1;}

.grid{max-width:1400px;margin:0 auto;padding:0 1rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;position:relative;z-index:1;}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}

.card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.85);
  border-radius:var(--r20);overflow:hidden;cursor:pointer;
  transition:all 0.2s;box-shadow:var(--shadow);
}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(5,150,105,0.15),0 2px 8px rgba(0,0,0,0.06);border-color:rgba(5,150,105,0.3);}
.card:active{transform:scale(0.98);}

.card-img-wrap{width:100%;overflow:hidden;border-radius:var(--r20) var(--r20) 0 0;background:rgba(0,0,0,0.04);max-height:140px;}
.card-img{width:100%;height:140px;object-fit:cover;object-position:center 45%;display:block;transition:transform 0.3s;cursor:ns-resize;}
.card:hover .card-img{transform:scale(1.03);}

.card-top{display:flex;align-items:center;gap:8px;padding:10px 12px 6px;}
.rarity-badge{font-family:'Syne',sans-serif;font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:var(--r99);letter-spacing:0.04em;flex-shrink:0;}
.rarity-badge.SSR{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border:1px solid rgba(245,158,11,0.3);}
.rarity-badge.SR{background:rgba(107,114,128,0.1);color:#4b5563;border:1px solid rgba(107,114,128,0.2);}
.rarity-badge.R{background:rgba(120,83,20,0.08);color:#78350f;border:1px solid rgba(120,83,20,0.15);}
.card-name{font-weight:700;font-size:0.88rem;flex:1;line-height:1.3;color:var(--tx);}
.card-subname{font-size:0.68rem;color:var(--tx3);margin-top:1px;}
.card-tags{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.attr-tag{font-size:0.62rem;padding:2px 6px;border-radius:var(--r4,4px);font-weight:600;}
.attr-地{background:rgba(16,185,129,0.1);color:#065f46;border:1px solid rgba(16,185,129,0.2);}
.attr-光{background:rgba(245,158,11,0.1);color:#92400e;border:1px solid rgba(245,158,11,0.2);}
.attr-闇{background:rgba(5,150,105,0.1);color:#065f46;border:1px solid rgba(5,150,105,0.2);}
.atk-tag{font-size:0.62rem;padding:2px 6px;border-radius:var(--r4,4px);font-weight:500;background:rgba(59,130,246,0.1);color:#1e40af;border:1px solid rgba(59,130,246,0.2);}

.card-skills{padding:0 12px 10px;display:flex;flex-direction:column;gap:3px;}
.skill-item{display:flex;gap:5px;align-items:flex-start;}
.skill-label{font-size:0.58rem;padding:2px 5px;border-radius:4px;flex-shrink:0;margin-top:1px;font-weight:700;}
.skill-label.p{background:rgba(5,150,105,0.1);color:var(--accent);}
.skill-label.a{background:rgba(59,130,246,0.1);color:#2563eb;}
.skill-text{font-size:0.72rem;color:var(--tx2);line-height:1.5;}
.skill-name{color:var(--tx);font-weight:600;}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:rgba(255,255,255,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.95);border-radius:var(--r24);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:flex-start;gap:12px;}
.modal-rarity{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;padding:4px 12px;border-radius:var(--r99);}
.modal-title{flex:1;}
.modal-name{font-size:1.1rem;font-weight:700;line-height:1.3;color:var(--tx);}
.modal-subname{font-size:0.78rem;color:var(--tx3);margin-top:3px;}
.modal-close{background:rgba(0,0,0,0.06);border:none;color:var(--tx2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.modal-close:hover{background:var(--accent);color:#fff;}
.modal-body{padding:1.25rem 1.5rem;}
.modal-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.modal-section-title{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--tx3);margin-bottom:0.6rem;font-weight:700;}
.modal-skill{background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.85);border-radius:var(--r12);padding:10px 12px;margin-bottom:8px;}
.modal-skill-header{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
.modal-skill-name{font-size:0.85rem;font-weight:700;color:var(--tx);}
.modal-skill-cost{font-size:0.68rem;color:var(--accent);background:rgba(5,150,105,0.08);padding:2px 7px;border-radius:var(--r4,4px);}
.modal-skill-desc{font-size:0.78rem;color:var(--tx2);line-height:1.6;}
.empty{text-align:center;padding:4rem 2rem;color:var(--tx3);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.2;}
.empty-text{font-size:0.85rem;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">PARANOIZE</div>
  <div class="logo-sub">カード図鑑</div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="キャラ名・スキル名で検索..." oninput="render()">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="filters" id="filters">
  <button class="p-chip" onclick="toggleF('rarity','SSR',this)">SSR</button>
  <button class="p-chip" onclick="toggleF('rarity','SR',this)">SR</button>
  <button class="p-chip" onclick="toggleF('rarity','R',this)">R</button>
  <button class="p-chip" onclick="toggleF('attr','地',this)">🟢 地</button>
  <button class="p-chip" onclick="toggleF('attr','光',this)">🟡 光</button>
  <button class="p-chip" onclick="toggleF('attr','闇',this)">🟣 闇</button>
  <button class="p-chip" onclick="toggleF('atk','物理',this)">物理</button>
  <button class="p-chip" onclick="toggleF('atk','特殊',this)">特殊</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="cardGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<nav class="p-tabbar">
  <a class="p-tab" href="/"><span class="p-tab-icon">🏠</span>ホーム</a>
  <a class="p-tab active" href="/cards"><span class="p-tab-icon">📖</span>カード</a>
  <a class="p-tab" href="/formation"><span class="p-tab-icon">🧩</span>編成</a>
  <a class="p-tab" href="/tasks"><span class="p-tab-icon">📅</span>タスク</a>
  <a class="p-tab" href="/memo"><span class="p-tab-icon">📝</span>メモ</a>
</nav>

<script>
let query = '';
let filters = {rarity:[], attr:[], atk:[]};
let filtered = [];

function toggleF(type, val, btn) {
  const arr = filters[type];
  const idx = arr.indexOf(val);
  if (idx >= 0) { arr.splice(idx, 1); btn.classList.remove('on'); }
  else { arr.push(val); btn.classList.add('on'); }
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('show');
  query = '';
  render();
}

function matchCard(c) {
  if (filters.rarity.length && !filters.rarity.includes(c.rarity)) return false;
  if (filters.attr.length && !filters.attr.includes(c.attr)) return false;
  if (filters.atk.length && !filters.atk.includes(c.atk)) return false;
  if (!query) return true;
  const hay = [c.name, c.card, c.series, c.attr, c.atk, c.rarity, ...c.passive, ...c.active].join(' ').toLowerCase();
  return hay.includes(query);
}

function skillShort(s) {
  const m = s.match(/^(.+?)\s*—\s*/);
  return m ? m[1] : s.split('—')[0].trim();
}
function skillDesc(s) {
  const parts = s.split('—');
  return parts.length > 1 ? parts.slice(1).join('—').trim() : '';
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  query = q;
  document.getElementById('clearBtn').classList.toggle('show', q.length > 0);
  filtered = CARDS.filter(matchCard);
  document.getElementById('stats').textContent = filtered.length + ' / ' + CARDS.length + ' カード表示中';
  const grid = document.getElementById('cardGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-text">該当するカードが見つかりませんでした</div></div>';
    return;
  }
  grid.innerHTML = filtered.map((c, i) => {
    const imgKey = (c.rarity + '_' + c.name + '_' + c.card).replace(/\s/g,'');
    const savedPos = getImgPos(imgKey);
    const defaultPos = getImgStyle(c.img);
    const imgPos = savedPos !== null ? 'center ' + savedPos + '%' : defaultPos;
    const imgHtml = c.img ? `<div class="card-img-wrap"><img class="card-img" src="${c.img}" alt="${c.name}" loading="lazy" data-key="${imgKey}" style="object-position:${imgPos}" onerror="this.parentElement.style.display='none'"></div>` : '';
    const passiveItems = c.passive.slice(0,2).map(s =>
      '<div class="skill-item"><span class="skill-label p">P</span><span class="skill-text"><span class="skill-name">' + skillShort(s) + '</span>' + (skillDesc(s) ? ' — ' + skillDesc(s) : '') + '</span></div>'
    ).join('');
    const activeItems = c.active.slice(0,2).map(s =>
      '<div class="skill-item"><span class="skill-label a">A</span><span class="skill-text"><span class="skill-name">' + skillShort(s) + '</span>' + (skillDesc(s) ? ' — ' + skillDesc(s) : '') + '</span></div>'
    ).join('');
    return '<div class="card" onclick="openModal(' + i + ')">' +
      imgHtml +
      '<div class="card-top">' +
        '<span class="rarity-badge ' + c.rarity + '">' + c.rarity + '</span>' +
        '<div><div class="card-name">' + c.name + '</div><div class="card-subname">「' + c.card + '」</div></div>' +
        '<div class="card-tags"><span class="attr-tag attr-' + c.attr + '">' + c.attr + '</span><span class="atk-tag">' + c.atk + '</span></div>' +
      '</div>' +
      '<div class="card-skills">' + passiveItems + activeItems +
        ((c.passive.length + c.active.length) > 4 ? '<div style="font-size:0.72rem;color:var(--tx3);padding-left:8px;">+ もっと見る</div>' : '') +
      '</div></div>';
  }).join('');
  setTimeout(initAllImgDrag, 50);
}

const CARDS = [
  {rarity:'SSR',name:'望月 那由多',card:'ファースト・ラブ',series:'恒常',attr:'地',atk:'特殊',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_mochizuki_nayuta_first_love.PNG',passive:["入場スリープ(2体) — 増援から場に出た時、ランダムな敵2体を各一定の確率で睡眠状態にする。", "回復の遺志 — 戦闘不能になった時、HPの割合が最も低い味方1体のHPを50%回復する。"],active:["ファーストエイド 70TU/-2MP — 自身、または味方1体のHPを50%回復する。", "サバイバー 130TU — 敵1体に5倍のダメージ。300TU生存すると使用可能。", "迅速攻撃 70TU — 敵1体に0.75倍のダメージ。"]},
  {rarity:'SSR',name:'天草 仁',card:'あなたを見ていると',series:'限定',attr:'闇',atk:'物理',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_amakusa_jin_looking_at_you.PNG',passive:["ポイズンスキン — 自身を倒した敵を一定の確率で毒状態にする。", "EX反撃体勢 — 初めて攻撃された時、100%の確率で次のターンを獲得する。"],active:["シリアルキラー(2体) 160TU — 敵2体に4倍のダメージ。2キル以上で使用可能。", "強化アタック(2体) 250TU/-3MP — 敵2体に2倍のダメージ。", "アタック(2体) 160TU — 敵2体に0.75倍のダメージ。"]},
  {rarity:'SSR',name:'黒澤 アンナ',card:'心を惑わす嘘',series:'水着',attr:'地',atk:'特殊',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_kurosawa_anna_misleading_liePNG.PNG',passive:["復讐スリープ(2体) — 敵の攻撃で戦闘不能時、その敵と別のランダムな敵1体を睡眠状態にする。", "逆境の一撃EX(2体) 100TU — 敵2体に5倍のダメージ。HP30%以下で使用可能。(EX/1回のみ)"],active:["ドリームハンター 130TU — 眠っている敵1体に6倍のダメージ。", "スリープタッチ 50TU/-3MP — 敵1体に0.25倍ダメージ＋睡眠状態にする。", "迅速攻撃 70TU — 敵1体に0.75倍のダメージ。"]},
  {rarity:'SSR',name:'鳳梨 麗華',card:'夕立の迷子',series:'限定',attr:'地',atk:'特殊',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_hourly_reika_evening_shower.PNG',passive:["反撃態勢 — 攻撃された時、一定の確率で次のターンを獲得する。", "根性 — 致命傷を受けても、HP1で生き残る。"],active:["逆境ドレイン 160TU/-3MP — 敵1体に5倍ダメージ＋自身HP50%回復。HP30%未満で使用可能。", "サバイバー 200TU — 敵1体に6倍のダメージ。300TU生存すると使用可能。", "アタック(2体) 160TU — 敵2体に0.75倍のダメージ。"]},
  {rarity:'SSR',name:'橘 結衣',card:'ピュアな駆け引き',series:'限定',attr:'光',atk:'物理',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_tachibana_yui_pure_game.PNG',passive:["反撃態勢 — 攻撃された時、一定の確率で次のターンを獲得する。", "回復の遺志 — 戦闘不能になった時、HPの割合が最も低い味方1体のHPを50%回復する。"],active:["HP反転 100TU/-3MP — 自身の残りHPと失ったHPを入れ替える。HP30%未満で使用可能。", "タイムストライク 100TU — 130TU以上の敵に4倍(200TU以上なら5倍)のダメージ。", "アタック(全体) 250TU — 敵全体に0.5倍のダメージ。"]},
  {rarity:'SSR',name:'蒼木 祥子',card:'今夜のデザートは…',series:'水着',attr:'光',atk:'特殊',img:'https://hpyaocrnmvnnbltbazrx.supabase.co/storage/v1/object/public/card-images/SSR_aoki_shoko_tonights_dessert.PNG',passive:["入場スタン(2体) — 増援から場に出た時、ランダムな敵2体を各一定の確率で150TUスタンする。", "HP反転 100TU/-3MP — 自身の残りHPと失ったHPを入れ替える。HP30%未満で使用可能。"],active:["シリアルキラー 130TU — 敵1体に5倍のダメージ。2キル以上で使用可能。", "タイムストライク 100TU — 130TU以上の敵に4倍(200TU以上なら5倍)のダメージ。", "アタック(2体) 160TU — 敵2体に0.75倍のダメージ。"]},

var imgPositions = JSON.parse(localStorage.getItem('paranoise_img_pos') || '{}');

function saveImgPos(key, val) {
  imgPositions[key] = val;
  localStorage.setItem('paranoise_img_pos', JSON.stringify(imgPositions));
}


function getImgPos(key) {
  // localStorageの調整値を優先、なければコード固定値、それもなければデフォルト
  if (imgPositions[key] !== undefined) return imgPositions[key];
  return null; // マップはobject-positionで直接処理
}

function getImgStyle(filename) {
  // ファイル名からpositionを取得
  if (!filename) return 'center 45%';
  var name = filename.split('/').pop();
  return IMG_POS_MAP[name] || 'center 45%';
}

function applyImgPositions() {
  document.querySelectorAll('.card-img').forEach(function(img) {
    var key = img.dataset.key;
    if (!key) return;
    var pos = getImgPos(key);
    img.style.objectPosition = 'center ' + pos + '%';
  });
}

// 長押し・ドラッグで位置調整
function initImgDrag(img) {
  var key = img.dataset.key;
  var startY = 0;
  var startPos = 0;
  var isDragging = false;
  var longPressTimer = null;
  var overlay = null;

  function showOverlay() {
    overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(107,70,245,0.25);display:flex;align-items:center;justify-content:center;border-radius:var(--r12) var(--r12) 0 0;z-index:10;pointer-events:none;';
    overlay.innerHTML = '<div style="background:rgba(107,70,245,0.9);color:#fff;font-size:0.7rem;padding:4px 10px;border-radius:20px;font-weight:700;">↕ ドラッグして調整</div>';
    img.parentElement.style.position = 'relative';
    img.parentElement.appendChild(overlay);
  }

  function hideOverlay() {
    if (overlay) { overlay.remove(); overlay = null; }
  }

  img.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    startPos = getImgPos(key);
    longPressTimer = setTimeout(function() {
      isDragging = true;
      showOverlay();
    }, 400);
  }, {passive:true});

  img.addEventListener('touchmove', function(e) {
    if (!isDragging) { clearTimeout(longPressTimer); return; }
    e.preventDefault();
    var dy = e.touches[0].clientY - startY;
    var newPos = Math.max(0, Math.min(100, startPos + dy * 0.5));
    img.style.objectPosition = 'center ' + newPos + '%';
    saveImgPos(key, newPos);
  }, {passive:false});

  img.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
    isDragging = false;
    hideOverlay();
  });

  // PCでもマウスドラッグ対応
  img.addEventListener('mousedown', function(e) {
    startY = e.clientY;
    startPos = getImgPos(key);
    longPressTimer = setTimeout(function() {
      isDragging = true;
      showOverlay();
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }, 400);
  });

  function onMouseMove(e) {
    if (!isDragging) return;
    var dy = e.clientY - startY;
    var newPos = Math.max(0, Math.min(100, startPos + dy * 0.5));
    img.style.objectPosition = 'center ' + newPos + '%';
    saveImgPos(key, newPos);
  }

  function onMouseUp() {
    clearTimeout(longPressTimer);
    isDragging = false;
    hideOverlay();
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }

  img.addEventListener('mouseup', function() { clearTimeout(longPressTimer); });
}

function openModal(filteredIdx) {
  const c = filtered[filteredIdx];
  const modal = document.getElementById('modal');
  const passiveHtml = c.passive.map(s => `
    <div class="modal-skill">
      <div class="modal-skill-header">
        <span class="skill-label p" style="font-size:0.68rem;">パッシブ</span>
        <span class="modal-skill-name">${skillShort(s)}</span>
      </div>
      <div class="modal-skill-desc">${skillDesc(s)}</div>
    </div>`).join('');
  const activeHtml = c.active.map(s => `
    <div class="modal-skill">
      <div class="modal-skill-header">
        <span class="skill-label a" style="font-size:0.68rem;">アクティブ</span>
        <span class="modal-skill-name">${skillShort(s)}</span>
        ${s.match(/\d+TU/)? `<span class="modal-skill-cost">${s.match(/[\d.]+TU[^—]*/)?.[0]?.trim()||''}</span>` : ''}
      </div>
      <div class="modal-skill-desc">${skillDesc(s)}</div>
    </div>`).join('');
  const mImgHtml = c.img ? `<div style="width:100%;background:#f0f0f5;border-radius:var(--r12) var(--r12) 0 0;overflow:hidden;cursor:pointer;" onclick="toggleImgFull(this)"><img src="${c.img}" alt="${c.name}" style="width:100%;height:260px;object-fit:cover;object-position:center 45%;display:block;transition:all 0.3s;" onerror="this.parentElement.style.display='none'"><div style="text-align:center;font-size:0.7rem;color:var(--tx3);padding:4px;">タップで全体表示</div></div>` : '';
  modal.innerHTML = `${mImgHtml}
    <div class="modal-header">
      <span class="modal-rarity rarity-badge ${c.rarity}">${c.rarity}</span>
      <div class="modal-title">
        <div class="modal-name">${c.name}</div>
        <div class="modal-subname">「${c.card}」</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta">
        <span class="attr-tag attr-${c.attr}">${c.attr}</span>
        <span class="atk-tag">${c.atk}</span>
        <span class="series-tag">${c.series}</span>
      </div>
      ${c.passive.length ? `<div class="modal-section-title">パッシブスキル</div>${passiveHtml}` : ''}
      ${c.active.length ? `<div class="modal-section-title" style="margin-top:${c.passive.length?'1rem':'0'}">アクティブスキル</div>${activeHtml}` : ''}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function toggleImgFull(wrap) {
  var img = wrap.querySelector('img');
  var hint = wrap.querySelector('div');
  if (wrap.dataset.full === '1') {
    img.style.height = '260px';
    img.style.objectFit = 'cover';
    img.style.objectPosition = 'center 45%';
    hint.textContent = 'タップで全体表示';
    wrap.dataset.full = '0';
  } else {
    img.style.height = 'auto';
    img.style.objectFit = 'contain';
    img.style.objectPosition = 'center center';
    hint.textContent = 'タップで戻す';
    wrap.dataset.full = '1';
  }
}

function initAllImgDrag() {
  document.querySelectorAll('.card-img').forEach(function(img) {
    if (!img.dataset.dragInit) {
      img.dataset.dragInit = '1';
      initImgDrag(img);
    }
  });
}
