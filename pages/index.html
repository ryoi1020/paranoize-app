<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOISE 攻略アプリ</title>
<link rel="stylesheet" href="/assets/common.css">
<style>
.hero{text-align:center;padding:2.5rem 1rem 2rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(107,70,245,0.07),transparent);pointer-events:none;}
.hero-logo{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,8vw,3.5rem);font-weight:800;letter-spacing:0.08em;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.hero-sub{font-size:0.75rem;letter-spacing:0.25em;color:var(--tx3);text-transform:uppercase;margin-top:0.5rem;font-weight:500;}
.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 1rem 1rem;}
.menu-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r16);padding:1.25rem;text-decoration:none;color:var(--tx);transition:all 0.2s;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);}
.menu-item:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow2);}
.menu-icon{font-size:1.75rem;line-height:1;}
.menu-title{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--tx);}
.menu-desc{font-size:0.72rem;color:var(--tx2);line-height:1.5;}
.menu-badge{font-size:0.62rem;padding:2px 8px;border-radius:var(--r99);background:var(--bg3);color:var(--tx3);border:1px solid var(--border2);display:inline-block;margin-top:2px;}
.version{text-align:center;padding:0.5rem;font-size:0.65rem;color:var(--tx3);}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-logo">PARANOISE</div>
  <div class="hero-sub">攻略アプリ</div>
</div>
<div class="menu">
  <a class="menu-item" href="/cards">
    <div class="menu-icon">📖</div>
    <div class="menu-title">カード検索</div>
    <div class="menu-desc">キャラ・スキルを検索。レアリティ・属性でフィルター。</div>
  </a>
  <a class="menu-item" href="/reika">
    <div class="menu-icon">⚔️</div>
    <div class="menu-title">麗華の野望</div>
    <div class="menu-desc">AIが状況を分析して戦略を提案。</div>
  </a>
  <a class="menu-item" href="/tasks">
    <div class="menu-icon">📅</div>
    <div class="menu-title">タスク管理</div>
    <div class="menu-desc">デイリー・ウィークリーと月次イベントを管理。</div>
  </a>
  <a class="menu-item" href="/memo">
    <div class="menu-icon">📝</div>
    <div class="menu-title">共有メモ</div>
    <div class="menu-desc">合言葉でアクセスできるメモスペース。</div>
  </a>
  <a class="menu-item" href="/board">
    <div class="menu-icon">💬</div>
    <div class="menu-title">掲示板</div>
    <div class="menu-desc">ギルド募集・雑談・攻略情報を共有。</div>
  </a>
  <a class="menu-item" href="/formation">
    <div class="menu-icon">🧠</div>
    <div class="menu-title">編成アドバイザー</div>
    <div class="menu-desc">手持ちカードを選ぶだけでAIが最強編成を提案！</div>
  </a>
</div>
<div class="version">v1.0.0</div>
<nav class="p-tabbar">
  <a class="p-tab active" href="/"><span class="p-tab-icon">🏠</span>ホーム</a>
  <a class="p-tab" href="/cards"><span class="p-tab-icon">📖</span>カード</a>
  <a class="p-tab" href="/reika"><span class="p-tab-icon">⚔️</span>麗華</a>
  <a class="p-tab" href="/tasks"><span class="p-tab-icon">📅</span>タスク</a>
  <a class="p-tab" href="/memo"><span class="p-tab-icon">📝</span>メモ</a>
  <a class="p-tab" href="/board"><span class="p-tab-icon">💬</span>掲示板</a>
</nav>
</body>
</html>
