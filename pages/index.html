<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOISE 攻略アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--accent:#7c5cfc;--accent2:#b794f4;--glow:rgba(124,92,252,0.3);--tx:#e8e8f0;--tx2:#9090b0;--tx3:#5a5a7a;--border:rgba(124,92,252,0.2)}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.logo{font-family:'Syne',sans-serif;font-size:clamp(2rem,8vw,4rem);font-weight:800;letter-spacing:0.1em;background:linear-gradient(135deg,#fff 0%,var(--accent2) 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.logo-sub{font-size:0.8rem;letter-spacing:0.3em;color:var(--tx3);text-transform:uppercase;text-align:center;margin-top:0.5rem;margin-bottom:3rem;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;width:100%;max-width:600px;}
.menu-item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-decoration:none;color:var(--tx);transition:all 0.2s;cursor:pointer;display:block;}
.menu-item:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4),0 0 0 1px var(--accent);}
.menu-icon{font-size:2rem;margin-bottom:0.75rem;}
.menu-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:0.25rem;}
.menu-desc{font-size:0.78rem;color:var(--tx2);line-height:1.5;}
.badge{display:inline-block;font-size:0.65rem;padding:2px 7px;border-radius:4px;background:rgba(124,92,252,0.2);color:var(--accent2);border:1px solid var(--border);margin-top:6px;}
.glow-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(124,92,252,0.08),transparent);}
</style>
</head>
<body>
<div class="glow-bg"></div>
<div class="logo">PARANOISE</div>
<div class="logo-sub">攻略アプリ</div>
<div class="menu">
  <a class="menu-item" href="/cards">
    <div class="menu-icon">📖</div>
    <div class="menu-title">カード検索</div>
    <div class="menu-desc">キャラクター・スキルを検索。レアリティ・属性・攻撃種でフィルター。</div>
  </a>
  <a class="menu-item" href="/reika">
    <div class="menu-icon">⚔️</div>
    <div class="menu-title">麗華の野望</div>
    <div class="menu-desc">AIが状況を分析して今日と明日以降の戦略を提案します。</div>
  </a>
  <a class="menu-item" href="#" onclick="alert('準備中です！')">
    <div class="menu-icon">📅</div>
    <div class="menu-title">タスク管理</div>
    <div class="menu-desc">デイリー・ウィークリータスクとイベントスケジュール管理。</div>
    <span class="badge">準備中</span>
  </a>
  <a class="menu-item" href="/memo">
    <div class="menu-icon">📝</div>
    <div class="menu-title">共有メモ</div>
    <div class="menu-desc">合言葉でアクセスできるメモスペース。URLリンクも貼れます。</div>
  </a>
</div>
</body>
</html>
