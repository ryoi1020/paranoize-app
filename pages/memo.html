<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOISE — 共有メモ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#7c5cfc;--accent2:#b794f4;--glow:rgba(124,92,252,0.3);
  --tx:#e8e8f0;--tx2:#9090b0;--tx3:#5a5a7a;
  --border:rgba(124,92,252,0.2);--border2:rgba(255,255,255,0.08);
  --green:#00d4a0;--yellow:#f6c90e;--red:#ff4d6d;
  --r:10px;--rl:14px;--rs:6px;
}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:4rem;}
.nav{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border2);}
.nav-back{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--tx2);font-size:0.78rem;text-decoration:none;transition:all 0.15s;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.container{max-width:680px;margin:0 auto;padding:1.25rem 1rem;}

/* KEYWORD SCREEN */
.keyword-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem;}
.keyword-icon{font-size:3rem;margin-bottom:1rem;}
.keyword-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:0.5rem;}
.keyword-desc{font-size:0.85rem;color:var(--tx2);margin-bottom:1.5rem;line-height:1.6;}
.keyword-input-wrap{display:flex;gap:8px;width:100%;max-width:360px;}
.keyword-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--tx);font-size:1rem;font-family:'Noto Sans JP',sans-serif;outline:none;text-align:center;letter-spacing:0.1em;}
.keyword-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.keyword-btn{background:var(--accent);border:none;border-radius:var(--r);padding:10px 20px;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.15s;white-space:nowrap;}
.keyword-btn:hover{opacity:0.85;}
.keyword-history{margin-top:1.5rem;width:100%;max-width:360px;}
.keyword-history-title{font-size:0.72rem;color:var(--tx3);margin-bottom:8px;text-align:left;letter-spacing:0.1em;text-transform:uppercase;}
.keyword-chips{display:flex;flex-wrap:wrap;gap:6px;}
.keyword-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.78rem;color:var(--tx2);cursor:pointer;transition:all 0.15s;}
.keyword-chip:hover{border-color:var(--accent);color:var(--accent);}

/* MEMO SCREEN */
.memo-screen{display:none;}
.memo-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.memo-keyword-badge{background:rgba(124,92,252,0.15);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:0.85rem;color:var(--accent2);font-weight:500;display:flex;align-items:center;gap:6px;}
.memo-change-btn{background:none;border:none;color:var(--tx3);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:4px 8px;border-radius:6px;transition:all 0.15s;}
.memo-change-btn:hover{background:var(--bg3);color:var(--tx);}

/* ADD MEMO */
.add-memo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem;}
.add-memo-title-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;color:var(--tx);font-size:0.95rem;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:8px;}
.add-memo-title-input:focus{border-color:var(--accent);}
.add-memo-title-input::placeholder{color:var(--tx3);}
.add-memo-body{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--tx);font-size:0.88rem;font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;min-height:100px;line-height:1.7;}
.add-memo-body:focus{border-color:var(--accent);}
.add-memo-body::placeholder{color:var(--tx3);}
.add-memo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.add-memo-tag-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 10px;color:var(--tx2);font-size:0.78rem;font-family:'Noto Sans JP',sans-serif;outline:none;width:140px;}
.add-memo-tag-input::placeholder{color:var(--tx3);}
.add-memo-tag-input:focus{border-color:var(--accent);}
.save-btn{background:var(--accent);border:none;border-radius:var(--r);padding:7px 18px;color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.15s;}
.save-btn:hover{opacity:0.85;}

/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.filter-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:0.75rem;color:var(--tx2);cursor:pointer;transition:all 0.15s;}
.filter-chip:hover,.filter-chip.on{background:var(--bg4);border-color:var(--accent);color:var(--accent2);}
.search-input{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;color:var(--tx);font-size:0.78rem;font-family:'Noto Sans JP',sans-serif;outline:none;flex:1;min-width:140px;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--tx3);}

/* MEMO LIST */
.memo-list{display:flex;flex-direction:column;gap:10px;}
.memo-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:14px 16px;transition:border-color 0.15s;}
.memo-card:hover{border-color:var(--border);}
.memo-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.memo-card-title{font-size:0.95rem;font-weight:700;flex:1;line-height:1.4;}
.memo-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;}
.memo-card:hover .memo-card-actions{opacity:1;}
.memo-action-btn{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;font-size:0.85rem;border-radius:4px;transition:all 0.15s;line-height:1;}
.memo-action-btn:hover{background:var(--bg3);color:var(--tx);}
.memo-action-btn.del:hover{background:rgba(255,77,109,0.15);color:var(--red);}
.memo-card-body{font-size:0.85rem;color:var(--tx2);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.memo-card-body a{color:var(--accent2);text-decoration:none;}
.memo-card-body a:hover{text-decoration:underline;}
.memo-card-footer{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.memo-tag{font-size:0.65rem;padding:2px 8px;border-radius:4px;background:rgba(124,92,252,0.12);color:var(--accent2);border:1px solid rgba(124,92,252,0.2);}
.memo-date{font-size:0.68rem;color:var(--tx3);margin-left:auto;}

/* EDIT MODE */
.memo-card.editing{border-color:var(--accent);}
.edit-title{width:100%;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--rs);padding:6px 10px;color:var(--tx);font-size:0.95rem;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:6px;font-weight:700;}
.edit-body{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;color:var(--tx);font-size:0.85rem;font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;min-height:80px;line-height:1.7;}
.edit-body:focus{border-color:var(--accent);}
.edit-footer{display:flex;gap:6px;margin-top:6px;align-items:center;}
.edit-tag{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:4px 8px;color:var(--tx2);font-size:0.78rem;font-family:'Noto Sans JP',sans-serif;outline:none;width:130px;}
.edit-save{background:var(--accent);border:none;border-radius:var(--rs);padding:5px 14px;color:#fff;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.edit-cancel{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:5px 12px;color:var(--tx2);font-size:0.8rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* EMPTY */
.empty{text-align:center;padding:3rem 2rem;color:var(--tx3);}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.3;}
.empty-text{font-size:0.85rem;}

/* COPY TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:8px 18px;font-size:0.82rem;color:var(--tx);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}
</style>
<link rel="stylesheet" href="/assets/common.css">
</head>
<body>

<div class="nav">
  <a href="/" class="nav-back">← ホーム</a>
  <span class="nav-title">📝 共有メモ</span>
</div>

<div class="container">

  <!-- 合言葉入力画面 -->
  <div class="keyword-screen" id="keywordScreen">
    <div class="keyword-icon">🔑</div>
    <div class="keyword-title">合言葉を入力</div>
    <div class="keyword-desc">合言葉ごとに独立したメモスペースが作られます。<br>同じ合言葉を使えば同じメモにアクセスできます。</div>
    <div class="keyword-input-wrap">
      <input class="keyword-input" id="keywordInput" placeholder="合言葉を入力..." onkeydown="if(event.key==='Enter')enterKeyword()">
      <button class="keyword-btn" onclick="enterKeyword()">入る</button>
    </div>
    <div class="keyword-history" id="keywordHistory"></div>
  </div>

  <!-- メモ画面 -->
  <div class="memo-screen" id="memoScreen">
    <div class="memo-header">
      <div class="memo-keyword-badge">🔑 <span id="currentKeyword"></span></div>
      <button class="memo-change-btn" onclick="changeKeyword()">変更</button>
    </div>

    <div class="add-memo-card">
      <input class="add-memo-title-input" id="newTitle" placeholder="タイトル（任意）">
      <textarea class="add-memo-body" id="newBody" placeholder="メモを入力...&#10;URLも貼れます！&#10;例: https://example.com"></textarea>
      <div class="add-memo-footer">
        <input class="add-memo-tag-input" id="newTag" placeholder="タグ（任意）">
        <button class="save-btn" onclick="addMemo()">追加</button>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <input class="search-input" id="searchInput" placeholder="🔍 メモを検索..." oninput="renderMemos()">
    </div>

    <div class="memo-list" id="memoList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var currentKeyword = '';
var memos = [];
var activeTag = '';

function loadFromStorage(kw){
  try{
    var data = localStorage.getItem('paranoise_memo_' + kw);
    return data ? JSON.parse(data) : [];
  }catch(e){ return []; }
}

function saveToStorage(){
  localStorage.setItem('paranoise_memo_' + currentKeyword, JSON.stringify(memos));
}

function getHistory(){
  try{ return JSON.parse(localStorage.getItem('paranoise_memo_history') || '[]'); }
  catch(e){ return []; }
}

function addHistory(kw){
  var h = getHistory();
  h = h.filter(function(k){ return k !== kw; });
  h.unshift(kw);
  if(h.length > 8) h = h.slice(0, 8);
  localStorage.setItem('paranoise_memo_history', JSON.stringify(h));
}

function renderHistory(){
  var h = getHistory();
  var el = document.getElementById('keywordHistory');
  if(!h.length){ el.innerHTML=''; return; }
  el.innerHTML = '<div class="keyword-history-title">最近使った合言葉</div><div class="keyword-chips">' +
    h.map(function(k){ return '<span class="keyword-chip" onclick="quickEnter(\''+k+'\')">'+k+'</span>'; }).join('') +
    '</div>';
}

function quickEnter(kw){
  document.getElementById('keywordInput').value = kw;
  enterKeyword();
}

function enterKeyword(){
  var kw = document.getElementById('keywordInput').value.trim();
  if(!kw){ alert('合言葉を入力してください'); return; }
  currentKeyword = kw;
  memos = loadFromStorage(kw);
  addHistory(kw);
  document.getElementById('currentKeyword').textContent = kw;
  document.getElementById('keywordScreen').style.display = 'none';
  document.getElementById('memoScreen').style.display = 'block';
  renderMemos();
  renderTags();
}

function changeKeyword(){
  document.getElementById('keywordScreen').style.display = 'flex';
  document.getElementById('memoScreen').style.display = 'none';
  document.getElementById('keywordInput').value = '';
  renderHistory();
}

function addMemo(){
  var title = document.getElementById('newTitle').value.trim();
  var body = document.getElementById('newBody').value.trim();
  var tag = document.getElementById('newTag').value.trim();
  if(!body && !title){ alert('メモの内容を入力してください'); return; }
  var memo = {
    id: Date.now(),
    title: title,
    body: body,
    tag: tag,
    createdAt: new Date().toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    editing: false
  };
  memos.unshift(memo);
  saveToStorage();
  document.getElementById('newTitle').value = '';
  document.getElementById('newBody').value = '';
  document.getElementById('newTag').value = '';
  renderMemos();
  renderTags();
  showToast('メモを追加しました！');
}

function deleteMemo(id){
  if(!confirm('このメモを削除しますか？')) return;
  memos = memos.filter(function(m){ return m.id !== id; });
  saveToStorage();
  renderMemos();
  renderTags();
}

function startEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.editing = true;
  renderMemos();
}

function saveEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.title = document.getElementById('edit-title-'+id).value.trim();
  m.body = document.getElementById('edit-body-'+id).value.trim();
  m.tag = document.getElementById('edit-tag-'+id).value.trim();
  m.editing = false;
  saveToStorage();
  renderMemos();
  renderTags();
  showToast('保存しました！');
}

function cancelEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.editing = false;
  renderMemos();
}

function copyMemo(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  var text = (m.title ? m.title + '\n' : '') + m.body;
  navigator.clipboard.writeText(text).then(function(){ showToast('コピーしました！'); });
}

function renderTags(){
  var tags = [];
  memos.forEach(function(m){ if(m.tag && tags.indexOf(m.tag)<0) tags.push(m.tag); });
  var bar = document.getElementById('filterBar');
  var search = '<input class="search-input" id="searchInput" placeholder="🔍 メモを検索..." oninput="renderMemos()" value="'+(document.getElementById('searchInput')?document.getElementById('searchInput').value:'')+'">';
  if(tags.length === 0){ bar.innerHTML = search; return; }
  var chips = '<span class="filter-chip'+(activeTag===''?' on':'')+'" onclick="setTag(\'\')">すべて</span>' +
    tags.map(function(t){ return '<span class="filter-chip'+(activeTag===t?' on':'')+'" onclick="setTag(\''+t+'\')">'+t+'</span>'; }).join('');
  bar.innerHTML = search + chips;
}

function setTag(t){ activeTag = t; renderTags(); renderMemos(); }

function linkify(text){
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function renderMemos(){
  var search = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toLowerCase() : '';
  var filtered = memos.filter(function(m){
    if(activeTag && m.tag !== activeTag) return false;
    if(search){
      var hay = (m.title+' '+m.body+' '+m.tag).toLowerCase();
      if(hay.indexOf(search) < 0) return false;
    }
    return true;
  });
  var list = document.getElementById('memoList');
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">'+(memos.length===0?'まだメモがありません。最初のメモを追加してみましょう！':'該当するメモが見つかりません')+'</div></div>';
    return;
  }
  list.innerHTML = filtered.map(function(m){
    if(m.editing){
      return '<div class="memo-card editing">' +
        '<input class="edit-title" id="edit-title-'+m.id+'" value="'+escHtml(m.title)+'" placeholder="タイトル（任意）">' +
        '<textarea class="edit-body" id="edit-body-'+m.id+'">'+escHtml(m.body)+'</textarea>' +
        '<div class="edit-footer">' +
          '<input class="edit-tag" id="edit-tag-'+m.id+'" value="'+escHtml(m.tag)+'" placeholder="タグ">' +
          '<button class="edit-save" onclick="saveEdit('+m.id+')">保存</button>' +
          '<button class="edit-cancel" onclick="cancelEdit('+m.id+')">キャンセル</button>' +
        '</div></div>';
    }
    var titleHtml = m.title ? '<div class="memo-card-title">'+escHtml(m.title)+'</div>' : '';
    var bodyHtml = m.body ? '<div class="memo-card-body">'+linkify(escHtml(m.body))+'</div>' : '';
    var tagHtml = m.tag ? '<span class="memo-tag">'+escHtml(m.tag)+'</span>' : '';
    return '<div class="memo-card">' +
      '<div class="memo-card-header">' +
        (titleHtml || '<div style="flex:1;"></div>') +
        '<div class="memo-card-actions">' +
          '<button class="memo-action-btn" onclick="copyMemo('+m.id+')" title="コピー">📋</button>' +
          '<button class="memo-action-btn" onclick="startEdit('+m.id+')" title="編集">✏️</button>' +
          '<button class="memo-action-btn del" onclick="deleteMemo('+m.id+')" title="削除">🗑️</button>' +
        '</div>' +
      '</div>' +
      bodyHtml +
      '<div class="memo-card-footer">'+tagHtml+'<span class="memo-date">'+m.createdAt+'</span></div>' +
    '</div>';
  }).join('');
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// 初期表示
renderHistory();
</script>
<nav class="p-tabbar">
  <a class="p-tab" href="/" id="tab-home"><span class="p-tab-icon">🏠</span>ホーム</a>
  <a class="p-tab" href="/cards" id="tab-cards"><span class="p-tab-icon">📖</span>カード</a>
  <a class="p-tab" href="/formation" id="tab-formation"><span class="p-tab-icon">🧩</span>編成</a>
  <a class="p-tab" href="/tasks" id="tab-tasks"><span class="p-tab-icon">📅</span>タスク</a>
  <a class="p-tab" href="/memo" id="tab-memo"><span class="p-tab-icon">📝</span>メモ</a>
</nav>
<script>
(function(){
  var path = location.pathname;
  var map = {'/':[document.getElementById('tab-home')],'/cards':['tab-cards'],'/reika':['tab-reika'],'/tasks':['tab-tasks'],'/memo':['tab-memo'],'/board':['tab-board']};
  var tabs = {'tab-home':'tab-home','tab-cards':'tab-cards','tab-reika':'tab-reika','tab-tasks':'tab-tasks','tab-memo':'tab-memo','tab-board':'tab-board'};
  Object.keys(tabs).forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    var href = el.getAttribute('href');
    if(path === href || (href !== '/' && path.startsWith(href))) el.classList.add('active');
  });
})();
</script>
</body>
</html>
