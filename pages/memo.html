<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOIZE — 合言葉付きメモ</title>
<style>
body{background:var(--bg);}
.wrap{max-width:720px;margin:0 auto;padding:1rem;position:relative;z-index:1;}

.page-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 0.75rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#064e3b,#059669,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.9);border-radius:100px;padding:6px 14px;color:var(--tx2);font-size:0.78rem;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.06);font-weight:600;}

/* 合言葉画面 */
.keyword-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:2.5rem 1rem;}
.keyword-icon{font-size:3rem;margin-bottom:0.75rem;filter:drop-shadow(0 4px 12px rgba(5,150,105,0.3));}
.keyword-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--tx);margin-bottom:0.5rem;}
.keyword-desc{font-size:0.78rem;color:var(--tx2);line-height:1.7;margin-bottom:1.5rem;}
.keyword-input-wrap{display:flex;gap:8px;width:100%;max-width:400px;margin-bottom:1rem;}
.keyword-input{flex:1;background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.88);border-radius:100px;padding:10px 18px;font-size:0.88rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;}
.keyword-input:focus{border-color:rgba(5,150,105,0.4);box-shadow:0 0 0 3px rgba(5,150,105,0.08);}
.keyword-btn{padding:10px 20px;border-radius:100px;background:linear-gradient(135deg,#059669,#34d399);border:none;color:#fff;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;box-shadow:0 4px 12px rgba(5,150,105,0.3);}
.keyword-history-title{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;font-weight:700;}
.keyword-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.keyword-chip{padding:5px 14px;border-radius:100px;background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.85);color:var(--tx2);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;}
.keyword-chip:hover{border-color:rgba(5,150,105,0.3);color:#059669;}

/* メモ画面 */
.memo-screen{display:none;}
.memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.memo-keyword-badge{background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.2);border-radius:100px;padding:6px 16px;font-size:0.78rem;color:#059669;font-weight:700;}
.memo-change-btn{padding:6px 14px;border-radius:100px;background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.85);color:var(--tx2);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;}

/* 追加カード */
.add-memo-card{background:rgba(255,255,255,0.58);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.88);border-radius:20px;padding:1.1rem;margin-bottom:0.75rem;box-shadow:0 4px 20px rgba(0,0,0,0.06);position:relative;}
.add-memo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);}
.add-memo-title-input,.add-memo-tag-input{width:100%;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.85);border-radius:100px;padding:8px 14px;font-size:0.82rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:8px;}
.add-memo-title-input:focus,.add-memo-tag-input:focus{border-color:rgba(5,150,105,0.35);box-shadow:0 0 0 3px rgba(5,150,105,0.07);}
.add-memo-body{width:100%;min-height:90px;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.85);border-radius:14px;padding:10px 14px;font-size:0.85rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;line-height:1.7;margin-bottom:8px;}
.add-memo-body:focus{border-color:rgba(5,150,105,0.35);box-shadow:0 0 0 3px rgba(5,150,105,0.07);}
.add-memo-footer{display:flex;gap:8px;align-items:center;}
.add-memo-footer .add-memo-tag-input{flex:1;margin-bottom:0;}
.save-btn{padding:8px 18px;border-radius:100px;background:linear-gradient(135deg,#059669,#34d399);border:none;color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;box-shadow:0 3px 10px rgba(5,150,105,0.25);}

/* フィルターバー */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:0.75rem;}
.search-input{flex:1;min-width:160px;background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.88);border-radius:100px;padding:8px 16px;font-size:0.82rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;}
.search-input:focus{border-color:rgba(5,150,105,0.35);}
.filter-chip{padding:6px 14px;border-radius:100px;font-size:0.72rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.85);color:var(--tx2);font-family:'Noto Sans JP',sans-serif;}
.filter-chip.on{background:linear-gradient(135deg,#059669,#34d399);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(5,150,105,0.25);}

/* メモカードリスト */
.memo-list{display:grid;gap:0.6rem;}
@media(min-width:700px){.memo-list{grid-template-columns:1fr 1fr;}.wrap{padding:1.5rem 2rem;}}
.memo-card{background:rgba(255,255,255,0.58);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.88);border-radius:16px;padding:1rem 1.1rem;box-shadow:0 3px 14px rgba(0,0,0,0.05);position:relative;overflow:hidden;}
.memo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);}
.memo-card.editing{border-color:rgba(5,150,105,0.3);box-shadow:0 0 0 3px rgba(5,150,105,0.06);}
.memo-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.memo-card-title{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:var(--tx);flex:1;}
.memo-card-actions{display:flex;gap:4px;flex-shrink:0;}
.memo-action-btn{background:none;border:none;cursor:pointer;font-size:0.9rem;padding:2px 4px;opacity:0.5;transition:opacity 0.15s;}
.memo-action-btn:hover{opacity:1;}
.memo-action-btn.del:hover{opacity:0.7;}
.memo-card-body{font-size:0.8rem;color:var(--tx2);line-height:1.7;white-space:pre-wrap;word-break:break-all;margin-bottom:8px;}
.memo-card-body a{color:#059669;text-decoration:underline;}
.memo-card-footer{display:flex;align-items:center;justify-content:space-between;}
.memo-tag{font-size:0.62rem;padding:2px 8px;border-radius:100px;background:rgba(5,150,105,0.08);color:#059669;border:1px solid rgba(5,150,105,0.15);font-weight:600;}
.memo-date{font-size:0.62rem;color:var(--tx3);}

/* 編集フォーム */
.edit-title,.edit-tag{width:100%;background:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.88);border-radius:100px;padding:7px 12px;font-size:0.82rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:6px;}
.edit-body{width:100%;min-height:80px;background:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.88);border-radius:12px;padding:8px 12px;font-size:0.82rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;line-height:1.7;margin-bottom:6px;}
.edit-footer{display:flex;gap:6px;align-items:center;}
.edit-footer .edit-tag{flex:1;margin-bottom:0;}
.edit-save{padding:6px 14px;border-radius:100px;background:linear-gradient(135deg,#059669,#34d399);border:none;color:#fff;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.edit-cancel{padding:6px 12px;border-radius:100px;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.85);color:var(--tx2);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* 空状態 */
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.25;}
.empty-text{font-size:0.82rem;line-height:1.7;}

/* トースト */
.toast{position:fixed;bottom:calc(64px + 12px);left:50%;transform:translateX(-50%);background:rgba(26,26,46,0.9);backdrop-filter:blur(16px);border-radius:100px;padding:8px 20px;font-size:0.82rem;color:#fff;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);}
.toast.show{opacity:1;}
</style>
<link rel="stylesheet" href="/assets/common.css">
</head>
<body>

<div class="wrap">
  <div class="page-hdr">
    <a href="/" class="back-btn">← ホーム</a>
    <div class="page-title">📝 合言葉付きメモ</div>
  </div>

  <!-- 合言葉入力画面 -->
  <div class="keyword-screen" id="keywordScreen">
    <div class="keyword-icon">🔑</div>
    <div class="keyword-title">合言葉を入力</div>
    <div class="keyword-desc">合言葉ごとに独立したメモスペースが作られます。<br>同じ合言葉を使えば同じメモにアクセスできます。</div>
    <div class="keyword-input-wrap">
      <input class="keyword-input" id="keywordInput" placeholder="合言葉を入力..." onkeydown="if(event.key==='Enter')enterKeyword()">
      <button class="keyword-btn" onclick="enterKeyword()">入る</button>
    </div>
    <div class="keyword-history" id="keywordHistory"></div>
  </div>

  <!-- メモ画面 -->
  <div class="memo-screen" id="memoScreen">
    <div class="memo-header">
      <div class="memo-keyword-badge">🔑 <span id="currentKeyword"></span></div>
      <button class="memo-change-btn" onclick="changeKeyword()">変更</button>
    </div>

    <div class="add-memo-card">
      <input class="add-memo-title-input" id="newTitle" placeholder="タイトル（任意）">
      <textarea class="add-memo-body" id="newBody" placeholder="メモを入力...&#10;URLも貼れます！&#10;例: https://example.com"></textarea>
      <div class="add-memo-footer">
        <input class="add-memo-tag-input" id="newTag" placeholder="タグ（任意）">
        <button class="save-btn" onclick="addMemo()">追加</button>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <input class="search-input" id="searchInput" placeholder="🔍 メモを検索..." oninput="renderMemos()">
    </div>

    <div class="memo-list" id="memoList"></div>
  </div>



<div class="toast" id="toast"></div>

<script>
var currentKeyword = '';
var memos = [];
var activeTag = '';
// APIプロキシ経由でSupabaseにアクセス
async function loadFromStorage(kw){
  try{
    var local = localStorage.getItem('paranoise_memo_' + kw);
    var localData = local ? JSON.parse(local) : [];
    var res = await fetch('/api/memo?keyword=' + encodeURIComponent(kw));
    if(res.ok){
      var result = await res.json();
      if(result.data){
        var serverData = JSON.parse(result.data);
        // サーバーデータをローカルにも同期
        localStorage.setItem('paranoise_memo_' + kw, JSON.stringify(serverData));
        return serverData;
      }
    }
    return localData;
  }catch(e){
    console.log('サーバー取得失敗・ローカルキャッシュを使用:', e);
    showToast('オフラインモード：ローカルデータを表示中');
    var local = localStorage.getItem('paranoise_memo_' + kw);
    return local ? JSON.parse(local) : [];
  }
}

async function saveToStorage(){
  // ローカルに即時保存
  localStorage.setItem('paranoise_memo_' + currentKeyword, JSON.stringify(memos));
  try{
    var res = await fetch('/api/memo', {
      method: 'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'save', keyword: currentKeyword, data: JSON.stringify(memos)})
    });
    if(!res.ok) throw new Error('保存失敗');
  }catch(e){
    console.log('サーバー保存失敗:', e);
    showToast('⚠️ サーバー保存失敗：ローカルには保存済み');
  }
}

function getHistory(){
  try{ return JSON.parse(localStorage.getItem('paranoise_memo_history') || '[]'); }
  catch(e){ return []; }
}

function addHistory(kw){
  var h = getHistory();
  h = h.filter(function(k){ return k !== kw; });
  h.unshift(kw);
  if(h.length > 8) h = h.slice(0, 8);
  localStorage.setItem('paranoise_memo_history', JSON.stringify(h));
}

function renderHistory(){
  var h = getHistory();
  var el = document.getElementById('keywordHistory');
  if(!h.length){ el.innerHTML=''; return; }
  el.innerHTML = '<div class="keyword-history-title">最近使った合言葉</div><div class="keyword-chips">' +
    h.map(function(k){ return '<span class="keyword-chip" onclick="quickEnter(\''+k+'\')">'+k+'</span>'; }).join('') +
    '</div>';
}

function quickEnter(kw){
  document.getElementById('keywordInput').value = kw;
  enterKeyword();
}

async function enterKeyword(){
  var kw = document.getElementById('keywordInput').value.trim();
  if(!kw){ alert('合言葉を入力してください'); return; }
  currentKeyword = kw;
  memos = await loadFromStorage(kw);
  addHistory(kw);
  document.getElementById('currentKeyword').textContent = kw;
  document.getElementById('keywordScreen').style.display = 'none';
  document.getElementById('memoScreen').style.display = 'block';
  renderMemos();
  renderTags();
}

function changeKeyword(){
  document.getElementById('keywordScreen').style.display = 'flex';
  document.getElementById('memoScreen').style.display = 'none';
  document.getElementById('keywordInput').value = '';
  renderHistory();
}

async function addMemo(){
  var title = document.getElementById('newTitle').value.trim();
  var body = document.getElementById('newBody').value.trim();
  var tag = document.getElementById('newTag').value.trim();
  if(!body && !title){ alert('メモの内容を入力してください'); return; }
  var memo = {
    id: Date.now(),
    title: title,
    body: body,
    tag: tag,
    createdAt: new Date().toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    editing: false
  };
  memos.unshift(memo);
  await saveToStorage();
  document.getElementById('newTitle').value = '';
  document.getElementById('newBody').value = '';
  document.getElementById('newTag').value = '';
  renderMemos();
  renderTags();
  showToast('メモを追加しました！');
}

async function deleteMemo(id){
  if(!confirm('このメモを削除しますか？')) return;
  memos = memos.filter(function(m){ return m.id !== id; });
  await saveToStorage();
  renderMemos();
  renderTags();
}

function startEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.editing = true;
  renderMemos();
}

async function saveEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.title = document.getElementById('edit-title-'+id).value.trim();
  m.body = document.getElementById('edit-body-'+id).value.trim();
  m.tag = document.getElementById('edit-tag-'+id).value.trim();
  m.editing = false;
  await saveToStorage();
  renderMemos();
  renderTags();
  showToast('保存しました！');
}

function cancelEdit(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  m.editing = false;
  renderMemos();
}

function copyMemo(id){
  var m = memos.find(function(m){ return m.id === id; });
  if(!m) return;
  var text = (m.title ? m.title + '\n' : '') + m.body;
  navigator.clipboard.writeText(text).then(function(){ showToast('コピーしました！'); });
}

function renderTags(){
  var tags = [];
  memos.forEach(function(m){ if(m.tag && tags.indexOf(m.tag)<0) tags.push(m.tag); });
  var bar = document.getElementById('filterBar');
  var search = '<input class="search-input" id="searchInput" placeholder="🔍 メモを検索..." oninput="renderMemos()" value="'+(document.getElementById('searchInput')?document.getElementById('searchInput').value:'')+'">';
  if(tags.length === 0){ bar.innerHTML = search; return; }
  var chips = '<span class="filter-chip'+(activeTag===''?' on':'')+'" onclick="setTag(\'\')">すべて</span>' +
    tags.map(function(t){ return '<span class="filter-chip'+(activeTag===t?' on':'')+'" onclick="setTag(\''+t+'\')">'+t+'</span>'; }).join('');
  bar.innerHTML = search + chips;
}

function setTag(t){ activeTag = t; renderTags(); renderMemos(); }

function linkify(text){
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function renderMemos(){
  var search = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toLowerCase() : '';
  var filtered = memos.filter(function(m){
    if(activeTag && m.tag !== activeTag) return false;
    if(search){
      var hay = (m.title+' '+m.body+' '+m.tag).toLowerCase();
      if(hay.indexOf(search) < 0) return false;
    }
    return true;
  });
  var list = document.getElementById('memoList');
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">'+(memos.length===0?'まだメモがありません。最初のメモを追加してみましょう！':'該当するメモが見つかりません')+'</div></div>';
    return;
  }
  list.innerHTML = filtered.map(function(m){
    if(m.editing){
      return '<div class="memo-card editing">' +
        '<input class="edit-title" id="edit-title-'+m.id+'" value="'+escHtml(m.title)+'" placeholder="タイトル（任意）">' +
        '<textarea class="edit-body" id="edit-body-'+m.id+'">'+escHtml(m.body)+'</textarea>' +
        '<div class="edit-footer">' +
          '<input class="edit-tag" id="edit-tag-'+m.id+'" value="'+escHtml(m.tag)+'" placeholder="タグ">' +
          '<button class="edit-save" onclick="saveEdit('+m.id+')">保存</button>' +
          '<button class="edit-cancel" onclick="cancelEdit('+m.id+')">キャンセル</button>' +
        '</div></div>';
    }
    var titleHtml = m.title ? '<div class="memo-card-title">'+escHtml(m.title)+'</div>' : '';
    var bodyHtml = m.body ? '<div class="memo-card-body">'+linkify(escHtml(m.body))+'</div>' : '';
    var tagHtml = m.tag ? '<span class="memo-tag">'+escHtml(m.tag)+'</span>' : '';
    return '<div class="memo-card">' +
      '<div class="memo-card-header">' +
        (titleHtml || '<div style="flex:1;"></div>') +
        '<div class="memo-card-actions">' +
          '<button class="memo-action-btn" onclick="copyMemo('+m.id+')" title="コピー">📋</button>' +
          '<button class="memo-action-btn" onclick="startEdit('+m.id+')" title="編集">✏️</button>' +
          '<button class="memo-action-btn del" onclick="deleteMemo('+m.id+')" title="削除">🗑️</button>' +
        '</div>' +
      '</div>' +
      bodyHtml +
      '<div class="memo-card-footer">'+tagHtml+'<span class="memo-date">'+m.createdAt+'</span></div>' +
    '</div>';
  }).join('');
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// 初期表示
renderHistory();
</script>

  <a class="p-tab" href="/"><span class="p-tab-icon">🏠</span>ホーム</a>

  <a class="p-tab" href="/tasks"><span class="p-tab-icon">📅</span>タスク</a>
  <a class="p-tab" href="/memo"><span class="p-tab-icon">📝</span>メモ</a>
</nav>
<script>
(function(){
  var path = location.pathname;
  document.querySelectorAll('.p-tab').forEach(function(tab){
    var href = tab.getAttribute('href');
    if(href && (path === href || (href !== '/' && path.startsWith(href)))){
      tab.classList.add('active');
    }
  });
})();
</script>
