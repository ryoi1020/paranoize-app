<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOISE — デイリータスク管理</title>
<style>
body{background:var(--bg);}
.wrap{max-width:720px;margin:0 auto;padding:1rem;position:relative;z-index:1;}

/* ヘッダー */
.page-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 0.75rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#064e3b,#059669,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* 日付ヘッダー */
.date-card{background:linear-gradient(135deg,rgba(4,120,87,0.88),rgba(5,150,105,0.82),rgba(52,211,153,0.75));border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:1.1rem 1.25rem;margin-bottom:0.75rem;box-shadow:0 8px 28px rgba(5,150,105,0.25);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;}
.date-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);}
.date-main{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;}
.date-sub{font-size:0.72rem;color:rgba(255,255,255,0.7);margin-top:2px;}

/* ガラスカード */
.glass-card{background:rgba(255,255,255,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.85);border-radius:20px;padding:1.1rem 1.25rem;margin-bottom:0.75rem;box-shadow:0 4px 20px rgba(0,0,0,0.06);position:relative;overflow:hidden;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);}

/* セクションヘッダー */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.section-title{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px;}
.section-badge{font-size:0.65rem;padding:2px 8px;border-radius:100px;background:rgba(5,150,105,0.1);color:#059669;border:1px solid rgba(5,150,105,0.2);font-weight:700;}

/* プログレス */
.progress-wrap{margin-bottom:0.75rem;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-label{font-size:0.72rem;color:var(--tx2);font-weight:600;}
.progress-count{font-size:0.72rem;color:#059669;font-weight:700;}
.progress-bar{height:5px;background:rgba(0,0,0,0.07);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#059669,#34d399);border-radius:100px;transition:width 0.4s ease;}

/* 曜日ボーナス */
.bonus-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:0.75rem;}
.bonus-day{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.85);border-radius:10px;padding:6px 4px;text-align:center;}
.bonus-day.today{background:linear-gradient(135deg,#059669,#34d399);border-color:transparent;box-shadow:0 3px 10px rgba(5,150,105,0.3);}
.bonus-day-name{font-size:0.6rem;color:var(--tx3);font-weight:700;margin-bottom:3px;}
.bonus-day.today .bonus-day-name{color:rgba(255,255,255,0.8);}
.bonus-item{font-size:0.58rem;color:var(--tx2);line-height:1.4;}
.bonus-day.today .bonus-item{color:rgba(255,255,255,0.9);}

/* タスクアイテム */
.task-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer;transition:opacity 0.15s;user-select:none;}
.task-item:last-child{border-bottom:none;}
.task-item.done{opacity:0.38;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(5,150,105,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;background:rgba(255,255,255,0.6);}
.task-item.done .task-check{background:linear-gradient(135deg,#059669,#34d399);border-color:transparent;}
.check-icon{font-size:0.7rem;color:#fff;display:none;}
.task-item.done .check-icon{display:block;}
.task-name{font-size:0.85rem;color:var(--tx);flex:1;line-height:1.4;}
.task-item.done .task-name{text-decoration:line-through;color:var(--tx3);}
.task-meta{font-size:0.62rem;color:var(--tx3);flex-shrink:0;}

/* 追加フォーム */
.add-btn{font-size:0.7rem;padding:4px 12px;border-radius:100px;background:rgba(5,150,105,0.08);border:1px solid rgba(5,150,105,0.2);color:#059669;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;transition:all 0.15s;}
.add-btn:hover{background:rgba(5,150,105,0.15);}
.add-form{display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.06);}
.add-form.show{display:block;}
.add-form-row{display:flex;gap:6px;margin-bottom:6px;}
.add-input{flex:1;background:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.9);border-radius:100px;padding:7px 14px;font-size:0.82rem;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;}
.add-input:focus{border-color:rgba(5,150,105,0.4);box-shadow:0 0 0 3px rgba(5,150,105,0.08);}
.form-submit{padding:7px 14px;border-radius:100px;background:linear-gradient(135deg,#059669,#34d399);border:none;color:#fff;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.form-cancel{font-size:0.72rem;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:0;}

/* 通知 */
.notice{background:rgba(5,150,105,0.08);border:1px solid rgba(5,150,105,0.2);border-radius:12px;padding:8px 14px;font-size:0.78rem;color:#059669;margin-bottom:0.75rem;display:none;font-weight:600;}
.notice.show{display:block;}

/* イベント */
.event-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);}
.event-item:last-child{border-bottom:none;}
.event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.event-name{font-size:0.82rem;color:var(--tx);flex:1;}
.event-badge{font-size:0.62rem;padding:2px 8px;border-radius:100px;font-weight:600;}

/* リセットボタン */
.reset-btn{font-size:0.68rem;padding:5px 14px;border-radius:100px;background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.85);color:var(--tx2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.05);}

/* 戻るボタン */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.9);border-radius:100px;padding:6px 14px;color:var(--tx2);font-size:0.78rem;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.06);font-weight:600;}

/* PC版レイアウト */
@media(min-width:700px){
  .wrap{padding:1.5rem 2rem;}
  .pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
  .pc-full{grid-column:1/-1;}
}
</style>
<link rel="stylesheet" href="/assets/common.css">

<body>

var FIXED_DAILY = [
  {id:'d1', name:'闘技場 バトル', meta:'毎日リセット'},
  {id:'d2', name:'調査（本田の極秘調査）', meta:'毎日'},
  {id:'d3', name:'釣り', meta:'毎日'},
  {id:'d4', name:'レイド参加', meta:'12:45〜 / 19:45〜'},
  {id:'d5', name:'合宿ボーナス確認', meta:'毎日'},
  {id:'d6', name:'無料宝箱（緑羽根）', meta:'毎日12:00'},
  {id:'d7', name:'柳葉の鉱山バイト', meta:'火・金12:00'},
  {id:'d8', name:'麗華の野望', meta:'21:00〜21:45（通常版）'},
];

// 固定ウィークリータスク
var FIXED_WEEKLY = [
  {id:'w1', name:'ギルドコンテンツ参加', meta:'週次'},
  {id:'w2', name:'住みたい街ランキング確認', meta:'週次'},
  {id:'w3', name:'レイドミッション', meta:'月末1週間'},
];

var state = loadState();
checkAutoReset();
renderAll();

function renderBonusGrid(){
  var today = new Date().getDay();
  var days = [
    {day:0,label:'日',bonuses:['統率EXP×2.5','謎のROM×2']},
    {day:1,label:'月',bonuses:['統率EXP×1.5','謎のROM×2']},
    {day:2,label:'火',bonuses:['コイン×2','ガチャ更新','鉱山バイト','極秘調査']},
    {day:3,label:'水',bonuses:['合宿EXP×2']},
    {day:4,label:'木',bonuses:['統率EXP×2.5','謎のROM×2']},
    {day:5,label:'金',bonuses:['コイン×2','ガチャ更新','鉱山バイト','極秘調査']},
    {day:6,label:'土',bonuses:['合宿EXP×2']},
  ];
  var order = [1,2,3,4,5,6,0]; // 月〜日
  var grid = document.getElementById('bonusGrid');
  grid.innerHTML = order.map(function(d){
    var info = days[d];
    var isToday = d === today;
    var items = info.bonuses.map(function(b){
      var hl = b.indexOf('ガチャ')>=0||b.indexOf('鉱山')>=0||b.indexOf('極秘')>=0;
      return '<div class="bonus-item'+(hl?' highlight':'')+'">'+b+'</div>';
    }).join('');
    return '<div class="bonus-day'+(isToday?' today':'')+'"><div class="bonus-day-label">'+info.label+'</div>'+items+'</div>';
  }).join('');
}
renderBonusGrid();

function renderMonthlyEvents(){
  var now = new Date();
  var day = now.getDate();
  var month = now.getMonth()+1;
  var dow = now.getDay(); // 0=日

  // 今月15日に一番近い金曜を計算
  function nearestFriday15(m, y){
    var d15 = new Date(y, m-1, 15);
    var diff = (5 - d15.getDay() + 7) % 7;
    if(diff > 3) diff -= 7;
    return new Date(y, m-1, 15 + diff).getDate();
  }
  var fri15 = nearestFriday15(month, now.getFullYear());

  // 月次イベント定義
  var events = [
    {
      name:'ラッキーパック（小・大）',
      schedule:'毎月1日〜5日',
      active: day >= 1 && day <= 5,
      soon: day === 28 || day === 29 || day === 30 || day === 31,
    },
    {
      name:'ミッションパス',
      schedule:'2週間ごと（第1火曜〜）',
      active: true,
      soon: false,
      note:'デイリーミッションでPt獲得',
    },
    {
      name:'ワニナシ金融（1日0時）',
      schedule:'毎月1日0時〜5日間',
      active: day >= 1 && day <= 5,
      soon: day >= 28,
    },
    {
      name:'ワニナシ金融（15日前後の金曜）',
      schedule:'毎月15日前後の金曜12:00〜5日間',
      active: Math.abs(day - fri15) <= 2,
      soon: Math.abs(day - fri15) <= 5 && day < fri15,
    },
    {
      name:'鉱山ボーナス（金脈）',
      schedule:'毎月15日に一番近い金曜',
      active: day === fri15,
      soon: day >= fri15 - 2 && day < fri15,
    },
    {
      name:'レイドミッション',
      schedule:'月末の1週間（新エピ追加直前の火曜〜）',
      active: day >= 24,
      soon: day >= 20 && day < 24,
    },
  ];

  var list = document.getElementById('monthlyEventList');
  list.innerHTML = events.map(function(e){
    var cls = e.active ? 'active' : e.soon ? 'soon' : '';
    var badge = e.active ? '<span class="event-badge">開催中</span>' : e.soon ? '<span class="event-badge soon">もうすぐ</span>' : '';
    var note = e.note ? '<span style="color:var(--accent2);"> — '+e.note+'</span>' : '';
    return '<div class="event-item '+cls+'">' +
      '<div class="event-dot"></div>' +
      '<div class="event-content">' +
        '<div class="event-name">'+e.name+note+'</div>' +
        '<div class="event-schedule">'+e.schedule+'</div>' +
      '</div>' +
      badge +
      '</div>';
  }).join('');
}
renderMonthlyEvents();


updateDate();

function loadState() {
  try {
    var s = JSON.parse(localStorage.getItem('paranoise_tasks') || '{}');
    return {
      dailyDone: s.dailyDone || [],
      weeklyDone: s.weeklyDone || [],
      customTasks: s.customTasks || [],
      customDone: s.customDone || [],
      lastDaily: s.lastDaily || '',
      lastWeekly: s.lastWeekly || '',
    };
  } catch(e) { return {dailyDone:[],weeklyDone:[],customTasks:[],customDone:[],lastDaily:'',lastWeekly:''}; }
}

function saveState() {
  localStorage.setItem('paranoise_tasks', JSON.stringify(state));
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function weekStr() {
  var d = new Date();
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  var mon = new Date(d.setDate(diff));
  return mon.getFullYear() + '-' + (mon.getMonth()+1) + '-' + mon.getDate();
}

function checkAutoReset() {
  var today = todayStr();
  var week = weekStr();
  if (state.lastDaily !== today) {
    state.dailyDone = [];
    state.lastDaily = today;
    saveState();
  }
  if (state.lastWeekly !== week) {
    state.weeklyDone = [];
    state.lastWeekly = week;
    saveState();
    document.getElementById('weeklyNotice').style.display = 'block';
    setTimeout(function(){ document.getElementById('weeklyNotice').style.display = 'none'; }, 4000);
  }
}

function updateDate() {
  var d = new Date();
  var days = ['日','月','火','水','木','金','土'];
  var months = d.getMonth()+1;
  var dates = d.getDate();
  document.getElementById('dateMain').textContent = months + '月' + dates + '日（' + days[d.getDay()] + '）';
  document.getElementById('dateSub').textContent = d.getFullYear() + '年 ' + ['日','月','火','水','木','金','土'][d.getDay()] + '曜日';
}

function toggleTask(type, id) {
  var arr = type === 'daily' ? state.dailyDone : type === 'weekly' ? state.weeklyDone : state.customDone;
  var idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(id);
  saveState();
  renderAll();

  var today = new Date().getDay();
  var days = [
    {day:0,label:'日',bonuses:['統率EXP×2.5','謎のROM×2']},

    var isToday = d === today;
    var items = info.bonuses.map(function(b){
      var hl = b.indexOf('ガチャ')>=0||b.indexOf('鉱山')>=0||b.indexOf('極秘')>=0;
      return '<div class="bonus-item'+(hl?' highlight':'')+'">'+b+'</div>';
    }).join('');
    return '<div class="bonus-day'+(isToday?' today':'')+'"><div class="bonus-day-label">'+info.label+'</div>'+items+'</div>';
  }).join('');
}
renderBonusGrid();

  var now = new Date();
  var day = now.getDate();
  var month = now.getMonth()+1;
  var dow = now.getDay(); // 0=日

  // 今月15日に一番近い金曜を計算
  function nearestFriday15(m, y){
    var d15 = new Date(y, m-1, 15);
    var diff = (5 - d15.getDay() + 7) % 7;
    if(diff > 3) diff -= 7;
    return new Date(y, m-1, 15 + diff).getDate();
  }
  var fri15 = nearestFriday15(month, now.getFullYear());

  // 月次イベント定義
  var events = [
    {
      name:'ラッキーパック（小・大）',
      schedule:'毎月1日〜5日',
      active: day >= 1 && day <= 5,
      soon: day === 28 || day === 29 || day === 30 || day === 31,
    },
    {
      name:'ミッションパス',
      schedule:'2週間ごと（第1火曜〜）',
      active: true,
      soon: false,
      note:'デイリーミッションでPt獲得',
    },
    {
      name:'ワニナシ金融（1日0時）',
      schedule:'毎月1日0時〜5日間',
      active: day >= 1 && day <= 5,
      soon: day >= 28,
    },
    {
      name:'ワニナシ金融（15日前後の金曜）',
      schedule:'毎月15日前後の金曜12:00〜5日間',
      active: Math.abs(day - fri15) <= 2,
      soon: Math.abs(day - fri15) <= 5 && day < fri15,
    },

function renderTasks(listId, tasks, doneArr, type, canDelete) {
  var list = document.getElementById(listId);
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-task">タスクがありません</div>';
    return;
  }
  list.innerHTML = tasks.map(function(t) {
    var done = doneArr.indexOf(t.id) >= 0;
    var catClass = type === 'daily' ? 'cat-daily' : type === 'weekly' ? 'cat-weekly' : 'cat-custom';
    var delBtn = canDelete ? '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>' : '';
    var meta = t.meta ? '<div class="task-meta">'+t.meta+'</div>' : '';
    return '<div class="task-item'+(done?' done':'')+'" onclick="toggleTask(\''+type+'\',\''+t.id+'\')">' +
      '<div class="task-check"><span class="check-icon">✓</span></div>' +
      '<div class="task-content"><div class="task-name">'+t.name+'</div>'+meta+'</div>' +
      delBtn +
      '</div>';
  }).join('');
}

function renderAll() {
  // デイリー（固定＋カスタム追加）
  var extraDaily = state.customTasks.filter(function(t){ return t.fixed === 'daily'; });
  var allDaily = FIXED_DAILY.concat(extraDaily);
  renderTasks('dailyList', allDaily, state.dailyDone, 'daily', false);
  // カスタム追加ぶんは削除可能に
  var dailyList = document.getElementById('dailyList');
  var items = dailyList.querySelectorAll('.task-item');
  extraDaily.forEach(function(t, i) {
    var item = items[FIXED_DAILY.length + i];
    if (item) {
      item.innerHTML += '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>';
    }
  });
  var dDaily = state.dailyDone.filter(function(id){ return allDaily.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('dailyBadge').textContent = dDaily + '/' + allDaily.length;

  // ウィークリー
  var extraWeekly = state.customTasks.filter(function(t){ return t.fixed === 'weekly'; });
  var allWeekly = FIXED_WEEKLY.concat(extraWeekly);
  renderTasks('weeklyList', allWeekly, state.weeklyDone, 'weekly', false);
  var weeklyList = document.getElementById('weeklyList');
  var wItems = weeklyList.querySelectorAll('.task-item');
  extraWeekly.forEach(function(t, i) {
    var item = wItems[FIXED_WEEKLY.length + i];
    if (item) {
      item.innerHTML += '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>';
    }
  });
  var dWeekly = state.weeklyDone.filter(function(id){ return allWeekly.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('weeklyBadge').textContent = dWeekly + '/' + allWeekly.length;

  // カスタム
  var customs = state.customTasks.filter(function(t){ return !t.fixed; });
  renderTasks('customList', customs, state.customDone, 'custom', true);
  var dCustom = state.customDone.filter(function(id){ return customs.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('customBadge').textContent = dCustom + '/' + customs.length;

  // 全体進捗
  var totalTasks = allDaily.length + allWeekly.length + customs.length;
  var totalDone = dDaily + dWeekly + dCustom;
  document.getElementById('progressCount').textContent = totalDone + ' / ' + totalTasks;
  var pct = totalTasks > 0 ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}
