<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARANOISE — タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#7c5cfc;--accent2:#b794f4;--glow:rgba(124,92,252,0.3);
  --tx:#e8e8f0;--tx2:#9090b0;--tx3:#5a5a7a;
  --border:rgba(124,92,252,0.2);--border2:rgba(255,255,255,0.08);
  --green:#00d4a0;--yellow:#f6c90e;--red:#ff4d6d;
  --r:10px;--rl:14px;
}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:4rem;}
.nav{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border2);}
.nav-back{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--tx2);font-size:0.78rem;text-decoration:none;transition:all 0.15s;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}

.container{max-width:680px;margin:0 auto;padding:1.25rem 1rem;}

/* DATE HEADER */
.date-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.date-info{display:flex;flex-direction:column;}
.date-main{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;}
.date-sub{font-size:0.78rem;color:var(--tx3);margin-top:2px;}
.reset-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--tx2);font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* PROGRESS */
.progress-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:1.25rem;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:0.8rem;color:var(--tx2);}
.progress-count{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.4s ease;}

/* SECTION */
.section{margin-bottom:1.25rem;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.section-title{font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--tx3);display:flex;align-items:center;gap:6px;}
.section-badge{font-size:0.68rem;padding:2px 7px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--tx3);}
.add-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--tx3);font-size:0.72rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:4px;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* TASK ITEM */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:12px;transition:all 0.15s;cursor:pointer;}
.task-item:hover{border-color:var(--border);}
.task-item.done{opacity:0.5;}
.task-item.done .task-name{text-decoration:line-through;color:var(--tx3);}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:var(--bg3);}
.task-item.done .task-check{background:var(--accent);border-color:var(--accent);}
.task-check-icon{display:none;color:#fff;font-size:0.75rem;font-weight:700;}
.task-item.done .task-check-icon{display:block;}
.task-content{flex:1;min-width:0;}
.task-name{font-size:0.88rem;font-weight:500;line-height:1.4;}
.task-meta{font-size:0.72rem;color:var(--tx3);margin-top:2px;}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;}
.task-item:hover .task-actions{opacity:1;}
.task-del{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;font-size:0.85rem;border-radius:4px;transition:all 0.15s;line-height:1;}
.task-del:hover{background:rgba(255,77,109,0.15);color:var(--red);}

/* ADD FORM */
.add-form{background:var(--bg2);border:1px solid var(--accent);border-radius:var(--r);padding:12px 14px;display:none;margin-top:6px;}
.add-form.show{display:block;}
.add-form-row{display:flex;gap:8px;align-items:center;}
.add-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:0.88rem;font-family:'Noto Sans JP',sans-serif;outline:none;}
.add-input:focus{border-color:var(--accent);}
.add-input::placeholder{color:var(--tx3);}
.add-select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:0.85rem;font-family:'Noto Sans JP',sans-serif;outline:none;cursor:pointer;}
.form-submit{background:var(--accent);border:none;border-radius:6px;padding:8px 14px;color:#fff;font-size:0.85rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:opacity 0.15s;white-space:nowrap;}
.form-submit:hover{opacity:0.85;}
.form-cancel{background:none;border:none;color:var(--tx3);font-size:0.82rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:4px 8px;margin-top:6px;}

/* CATEGORY TAG */
.cat-tag{font-size:0.65rem;padding:2px 7px;border-radius:4px;font-weight:500;flex-shrink:0;}
.cat-daily{background:rgba(0,212,160,0.15);color:var(--green);border:1px solid rgba(0,212,160,0.3);}
.cat-weekly{background:rgba(246,201,14,0.15);color:var(--yellow);border:1px solid rgba(246,201,14,0.3);}
.cat-custom{background:rgba(124,92,252,0.15);color:var(--accent2);border:1px solid rgba(124,92,252,0.3);}

/* EMPTY */
.empty-task{text-align:center;padding:1.5rem;color:var(--tx3);font-size:0.82rem;}

/* WEEKLY RESET NOTICE */
.notice{background:rgba(246,201,14,0.08);border:1px solid rgba(246,201,14,0.2);border-radius:var(--r);padding:10px 14px;margin-bottom:1.25rem;font-size:0.78rem;color:var(--yellow);display:none;}
</style>
</head>
<body>

<div class="nav">
  <a href="/" class="nav-back">← ホーム</a>
  <span class="nav-title">📅 タスク管理</span>
</div>

<div class="container">

  <div class="date-header">
    <div class="date-info">
      <div class="date-main" id="dateMain"></div>
      <div class="date-sub" id="dateSub"></div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">デイリーリセット</button>
  </div>

  <div class="notice" id="weeklyNotice">
    📅 今週のウィークリータスクがリセットされました！
  </div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">今日の進捗</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- デイリータスク -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <span style="color:var(--green);">●</span> デイリー
        <span class="section-badge" id="dailyBadge">0/0</span>
      </div>
      <button class="add-btn" onclick="toggleForm('daily')">＋ 追加</button>
    </div>
    <div class="task-list" id="dailyList"></div>
    <div class="add-form" id="dailyForm">
      <div class="add-form-row">
        <input class="add-input" id="dailyInput" placeholder="タスク名を入力..." onkeydown="if(event.key==='Enter')addCustomTask('daily')">
        <button class="form-submit" onclick="addCustomTask('daily')">追加</button>
      </div>
      <button class="form-cancel" onclick="toggleForm('daily')">キャンセル</button>
    </div>
  </div>

  <!-- ウィークリータスク -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <span style="color:var(--yellow);">●</span> ウィークリー
        <span class="section-badge" id="weeklyBadge">0/0</span>
      </div>
      <button class="add-btn" onclick="toggleForm('weekly')">＋ 追加</button>
    </div>
    <div class="task-list" id="weeklyList"></div>
    <div class="add-form" id="weeklyForm">
      <div class="add-form-row">
        <input class="add-input" id="weeklyInput" placeholder="タスク名を入力..." onkeydown="if(event.key==='Enter')addCustomTask('weekly')">
        <button class="form-submit" onclick="addCustomTask('weekly')">追加</button>
      </div>
      <button class="form-cancel" onclick="toggleForm('weekly')">キャンセル</button>
    </div>
  </div>

  <!-- カスタムタスク -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <span style="color:var(--accent2);">●</span> カスタム
        <span class="section-badge" id="customBadge">0/0</span>
      </div>
      <button class="add-btn" onclick="toggleForm('custom')">＋ 追加</button>
    </div>
    <div class="task-list" id="customList"></div>
    <div class="add-form" id="customForm">
      <div class="add-form-row">
        <input class="add-input" id="customInput" placeholder="タスク名を入力..." onkeydown="if(event.key==='Enter')addCustomTask('custom')">
        <button class="form-submit" onclick="addCustomTask('custom')">追加</button>
      </div>
      <button class="form-cancel" onclick="toggleForm('custom')">キャンセル</button>
    </div>
  </div>

</div>

<script>
// 固定デイリータスク
var FIXED_DAILY = [
  {id:'d1', name:'闘技場 バトル', meta:'毎日リセット'},
  {id:'d2', name:'調査（本田の極秘調査）', meta:'毎日'},
  {id:'d3', name:'釣り', meta:'毎日'},
  {id:'d4', name:'レイド参加', meta:'12:45〜 / 19:45〜'},
  {id:'d5', name:'合宿ボーナス確認', meta:'毎日'},
  {id:'d6', name:'無料宝箱（緑羽根）', meta:'毎日12:00'},
  {id:'d7', name:'柳葉の鉱山バイト', meta:'火・金12:00'},
  {id:'d8', name:'麗華の野望', meta:'21:00〜21:45（通常版）'},
];

// 固定ウィークリータスク
var FIXED_WEEKLY = [
  {id:'w1', name:'ギルドコンテンツ参加', meta:'週次'},
  {id:'w2', name:'住みたい街ランキング確認', meta:'週次'},
  {id:'w3', name:'レイドミッション', meta:'月末1週間'},
];

var state = loadState();
checkAutoReset();
renderAll();
updateDate();

function loadState() {
  try {
    var s = JSON.parse(localStorage.getItem('paranoise_tasks') || '{}');
    return {
      dailyDone: s.dailyDone || [],
      weeklyDone: s.weeklyDone || [],
      customTasks: s.customTasks || [],
      customDone: s.customDone || [],
      lastDaily: s.lastDaily || '',
      lastWeekly: s.lastWeekly || '',
    };
  } catch(e) { return {dailyDone:[],weeklyDone:[],customTasks:[],customDone:[],lastDaily:'',lastWeekly:''}; }
}

function saveState() {
  localStorage.setItem('paranoise_tasks', JSON.stringify(state));
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function weekStr() {
  var d = new Date();
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  var mon = new Date(d.setDate(diff));
  return mon.getFullYear() + '-' + (mon.getMonth()+1) + '-' + mon.getDate();
}

function checkAutoReset() {
  var today = todayStr();
  var week = weekStr();
  if (state.lastDaily !== today) {
    state.dailyDone = [];
    state.lastDaily = today;
    saveState();
  }
  if (state.lastWeekly !== week) {
    state.weeklyDone = [];
    state.lastWeekly = week;
    saveState();
    document.getElementById('weeklyNotice').style.display = 'block';
    setTimeout(function(){ document.getElementById('weeklyNotice').style.display = 'none'; }, 4000);
  }
}

function updateDate() {
  var d = new Date();
  var days = ['日','月','火','水','木','金','土'];
  var months = d.getMonth()+1;
  var dates = d.getDate();
  document.getElementById('dateMain').textContent = months + '月' + dates + '日（' + days[d.getDay()] + '）';
  document.getElementById('dateSub').textContent = d.getFullYear() + '年 ' + ['日','月','火','水','木','金','土'][d.getDay()] + '曜日';
}

function toggleTask(type, id) {
  var arr = type === 'daily' ? state.dailyDone : type === 'weekly' ? state.weeklyDone : state.customDone;
  var idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(id);
  saveState();
  renderAll();
}

function addCustomTask(type) {
  var input = document.getElementById(type + 'Input');
  var val = input.value.trim();
  if (!val) return;
  if (type === 'custom') {
    var id = 'c' + Date.now();
    state.customTasks.push({id: id, name: val});
  } else if (type === 'daily') {
    var id = 'cd' + Date.now();
    state.customTasks.push({id: id, name: val, fixed: 'daily'});
  } else {
    var id = 'cw' + Date.now();
    state.customTasks.push({id: id, name: val, fixed: 'weekly'});
  }
  input.value = '';
  saveState();
  renderAll();
  toggleForm(type);
}

function deleteTask(id) {
  state.customTasks = state.customTasks.filter(function(t){ return t.id !== id; });
  state.customDone = state.customDone.filter(function(d){ return d !== id; });
  saveState();
  renderAll();
}

function toggleForm(type) {
  var form = document.getElementById(type + 'Form');
  var isShow = form.classList.contains('show');
  document.querySelectorAll('.add-form').forEach(function(f){ f.classList.remove('show'); });
  if (!isShow) {
    form.classList.add('show');
    document.getElementById(type + 'Input').focus();
  }
}

function confirmReset() {
  if (confirm('デイリータスクをリセットしますか？')) {
    state.dailyDone = [];
    state.lastDaily = todayStr();
    saveState();
    renderAll();
  }
}

function renderTasks(listId, tasks, doneArr, type, canDelete) {
  var list = document.getElementById(listId);
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-task">タスクがありません</div>';
    return;
  }
  list.innerHTML = tasks.map(function(t) {
    var done = doneArr.indexOf(t.id) >= 0;
    var catClass = type === 'daily' ? 'cat-daily' : type === 'weekly' ? 'cat-weekly' : 'cat-custom';
    var delBtn = canDelete ? '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>' : '';
    var meta = t.meta ? '<div class="task-meta">'+t.meta+'</div>' : '';
    return '<div class="task-item'+(done?' done':'')+'" onclick="toggleTask(\''+type+'\',\''+t.id+'\')">' +
      '<div class="task-check"><span class="task-check-icon">✓</span></div>' +
      '<div class="task-content"><div class="task-name">'+t.name+'</div>'+meta+'</div>' +
      delBtn +
      '</div>';
  }).join('');
}

function renderAll() {
  // デイリー（固定＋カスタム追加）
  var extraDaily = state.customTasks.filter(function(t){ return t.fixed === 'daily'; });
  var allDaily = FIXED_DAILY.concat(extraDaily);
  renderTasks('dailyList', allDaily, state.dailyDone, 'daily', false);
  // カスタム追加ぶんは削除可能に
  var dailyList = document.getElementById('dailyList');
  var items = dailyList.querySelectorAll('.task-item');
  extraDaily.forEach(function(t, i) {
    var item = items[FIXED_DAILY.length + i];
    if (item) {
      item.innerHTML += '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>';
    }
  });
  var dDaily = state.dailyDone.filter(function(id){ return allDaily.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('dailyBadge').textContent = dDaily + '/' + allDaily.length;

  // ウィークリー
  var extraWeekly = state.customTasks.filter(function(t){ return t.fixed === 'weekly'; });
  var allWeekly = FIXED_WEEKLY.concat(extraWeekly);
  renderTasks('weeklyList', allWeekly, state.weeklyDone, 'weekly', false);
  var weeklyList = document.getElementById('weeklyList');
  var wItems = weeklyList.querySelectorAll('.task-item');
  extraWeekly.forEach(function(t, i) {
    var item = wItems[FIXED_WEEKLY.length + i];
    if (item) {
      item.innerHTML += '<div class="task-actions"><button class="task-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">✕</button></div>';
    }
  });
  var dWeekly = state.weeklyDone.filter(function(id){ return allWeekly.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('weeklyBadge').textContent = dWeekly + '/' + allWeekly.length;

  // カスタム
  var customs = state.customTasks.filter(function(t){ return !t.fixed; });
  renderTasks('customList', customs, state.customDone, 'custom', true);
  var dCustom = state.customDone.filter(function(id){ return customs.some(function(t){ return t.id === id; }); }).length;
  document.getElementById('customBadge').textContent = dCustom + '/' + customs.length;

  // 全体進捗
  var totalTasks = allDaily.length + allWeekly.length + customs.length;
  var totalDone = dDaily + dWeekly + dCustom;
  document.getElementById('progressCount').textContent = totalDone + ' / ' + totalTasks;
  var pct = totalTasks > 0 ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}
</script>
</body>
</html>
